<!DOCTYPE html>
<html>
<head>
  <title>Alchemy Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Alchemy Planner</h1>

  <input id="ingredient1" list="ingredient1List" placeholder="Ingredient 1">
  <datalist id="ingredient1List"></datalist>

  <input id="ingredient2" list="ingredient2List" placeholder="Ingredient 2">
  <datalist id="ingredient2List"></datalist>

  <input id="ingredient3" list="ingredient3List" placeholder="Ingredient 3">
  <datalist id="ingredient3List"></datalist>

  <div id="results"></div>

  <hr>

  <h2>Search by Effect</h2>

  <input id="effectSearch" list="effectList" placeholder="Search effect">
  <datalist id="effectList"></datalist>

  <div id="effectResults"></div>

  <hr>

  <h3>Ingredient Lookup</h3>

  <input id="ingredientLookup" list="ingredientLookupList" placeholder="Search ingredient">
  <datalist id="ingredientLookupList"></datalist>

  <div id="ingredientLookupResults"></div>

  <script src="data/effects.js"></script>
  <script src="data/ingredients.js"></script>
  <script src="js/alchemyLogic.js"></script>
  <script src="js/ui.js"></script>

</body>
</html>
