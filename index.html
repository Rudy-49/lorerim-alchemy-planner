<!DOCTYPE html>
<html>
<head>
  <title>Alchemy Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Alchemy Planner</h1>

  <h2>Potion Builder</h2>

  <div class="custom-dropdown">
    <input id="ingredient1" placeholder="Ingredient 1" autocomplete="off">
    <div id="ingredient1Dropdown" class="dropdown-list"></div>
  </div>

  <div class="custom-dropdown">
    <input id="ingredient2" placeholder="Ingredient 2" autocomplete="off">
    <div id="ingredient2Dropdown" class="dropdown-list"></div>
  </div>

  <div class="custom-dropdown">
    <input id="ingredient3" placeholder="Ingredient 3" autocomplete="off">
    <div id="ingredient3Dropdown" class="dropdown-list"></div>
  </div>

  <div id="results"></div>

  <hr>

  <h2>Search by Effect</h2>

  <div class="custom-dropdown">
    <input id="effectSearch" placeholder="Search effect" autocomplete="off">
    <div id="effectDropdown" class="dropdown-list"></div>
  </div>

  <div id="effectResults"></div>

  <hr>

  <h2>Ingredient Lookup</h2>

  <div class="custom-dropdown">
    <input id="ingredientLookup" placeholder="Search ingredient" autocomplete="off">
    <div id="ingredientLookupDropdown" class="dropdown-list"></div>
  </div>

  <div id="ingredientLookupResults"></div>

  <script src="data/effects.js"></script>
  <script src="data/ingredients.js"></script>
  <script src="js/alchemyLogic.js"></script>
  <script src="js/ui.js"></script>

</body>
</html>
