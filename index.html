<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LoreRim Alchemy Book</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <main class="app">
    <section id="book" class="book closed" aria-label="LoreRim Alchemy Book">
      <button id="coverButton" class="book-cover" type="button" aria-label="Open LoreRim Alchemy Book">
        <span class="cover-click-text">Click to Open</span>
      </button>

      <div class="book-inside">
        <div class="book-frame-overlay"></div>
        <div id="pageFlipOverlay" class="page-flip-overlay"></div>
            <button id="prevPage" class="nav-btn left" type="button" aria-label="Previous page">
                <span>‹</span>
            </button>

        <section class="page left-page">
            <div class="page-inner" id="leftPageInner">
                <div id="leftPageContent"></div>
            </div>
        </section>

        <section class="page right-page">
            <div class="page-inner" id="rightPageInner">
                 <div id="rightPageContent"></div>
            </div>
        </section>

        <button id="nextPage" class="nav-btn right" type="button" aria-label="Next page">
          <span>›</span>
        </button>
      </div>
    </section>
  </main>

  <script src="js/helpers.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/potionDatabase.js"></script>
  <script src="js/ingredientLookup.js"></script>
  <script src="js/effectLookup.js"></script>
  <script src="data/ingredients.js"></script>
  <script src="data/effects.js"></script>
  <script src="js/potionBuilder.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
